    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>

        <!-- Main chat area -->
        <main class="chat-main">

            <!-- Top bar -->
            <header class="chat-topbar">
                <!--
                <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                -->
                <div class="topbar-brand" style="display: flex; align-items: center;">
                    <img src="/images/logo.png" alt="Logo" width="36" height="36" style="border-radius: 50%; margin-right: 10px; object-fit: cover;">
                    <span class="topbar-name">JavaGPT</span>
                </div>
                <div class="topbar-status" id="topbar-status">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-label">Connecting…</span>
                </div>
            </header>

            <!-- Messages -->
            <div class="messages-viewport" id="messages-viewport">
                <div class="messages-inner" id="messages-inner">

                    <!-- Welcome card -->
                    <div class="welcome-card">
                        <div class="welcome-avatar">
                            <img src="/images/logo.png" alt="JavaGPT Logo" width="84" height="84" style="border-radius: 50%; object-fit: cover;">
                        </div>
                        <h2 class="welcome-title">Hi, I'm JavaGPT 👋</h2>
                        <p class="welcome-sub">Ask me anything — GK, recipes, coding, support, and more.</p>
                    </div>

                </div>
            </div>

            <!-- Input bar -->
            <div class="input-bar-wrapper">
                <div class="input-bar">
                    <textarea
                        id="message-input"
                        placeholder="Message JavaGPT…"
                        rows="1"
                        autocomplete="off"
                    ></textarea>
                    <button id="send-button" disabled aria-label="Send message">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">JavaGPT can make mistakes. Always verify important information.</p>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
